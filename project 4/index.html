<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="">
        <h1>Tech Conference 2025- Event Registration</h1>
        <label for="">Please fill the form carefully to complite your registration</label>
        <fieldset>
            <legend>personal information</legend>
            <table>
                <tr>
                    <td><label for="">Full Name :</label></td>
                    <td> <input type="text" placeholder=" Enter your full name">
                    </td>
                </tr>

                <tr>
                    <td><label for="">Email Address :</label></td>
                    <td> <input type="email" placeholder="Enter your email">
                    </td>
                </tr>
                <tr>
                    <td><label for="">Phone Number :</label></td>
                    <td>                <input type="number" placeholder="Enter your phone number"></td>
                </tr>
                <tr>
                    <td>                <label for="">Address :</label></td>
                <td>                <input type="text" placeholder="Enter your Address"></td>
                </tr>
            </table>
           
        </fieldset>
        <fieldset>
            <legend>Professional Deteal:</legend>
    
            <label for="">Occupation</label>
            <select name="" id="">
                <option value="">Select your occupation</option>
            </select>
            <br>
            <label for="">Experience level :</label>
            <input type="radio" name="Experience level " id="Fresher">
            <label for="Fresher">Fresher</label>
            <input type="radio" name="Experience level " id="Intermediate">
            <label for="Intermediate">Intermediate</label>
            <input type="radio" name="Experience level " id="Expert">
            <label for="Expert">Expert</label>
            <br>
            <label for="">Skills (Select all that apply):</label>
            <input type="checkbox" name="Skills" id="HTML">
            <label for="HTML">HTML</label>
            <input type="checkbox" name="Skills" id="CSS">
            <label for="CSS">CSS</label>
            <input type="checkbox" name="Skills" id="javascript">
            <label for="javascript">javascript</label>
            <input type="checkbox" name="Skills" id="Node.js">
            <label for="Node.js">Node.js</label>
            <input type="checkbox" name="Skills" id="Python">
            <label for="Python">python</label>
            <input type="checkbox" name="Skills" id="Next.js">
            <label for="Next.js">Next.js</label>
            <br>
            <label for="">Current Organization /college</label>
            <input type="text" placeholder="Enter Organization or college">
        </fieldset>
        <br>
        <fieldset>
            <legend>Additional Details</legend>
            <br>
            <label for="">Uplopde profile photo :</label>
            <input type="file">
            <br>
            <label for="">Preferred Event Date :</label>
            <input type="date">
            <br>
            <label for="">Why do you want to attend this event?:</label>
            <br>
            <textarea name="" id="" placeholder="Write your answer here..."></textarea>
            <br>
            <label for="">How did you hear about us?:</label>
            <select name="" id="">
                <option value="">select an option</option>
            </select>
            <br>
        </fieldset>
        <fieldset>
            <legend>Terms & Conditions</legend>
            <input type="checkbox">
            <label for="I agree to the Terms & Conditions and Privacy Policy">I agree to the Terms & Conditions and Privacy Policy</label>
            <br>
        </fieldset>
        <button type="submit">Register now</button>

        <button type="reset">reset</button>

    </form>
</body>

</html>
